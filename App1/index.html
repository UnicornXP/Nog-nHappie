<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>App1 - SPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/catalish-huntera" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#603913">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
          <div class="brand">
            <a href="?page=public" class="brand-link">
                <img src="Assets/Logo.svg" alt="Site logo" class="brand-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block'">
            </a>
          </div>
          <nav class="nav">
            <a href="?page=public" class="nav-link" data-i18n="nav.public">Public</a>
            <a href="?page=login" class="nav-link" data-i18n="nav.login">Login</a>
            <a href="?page=home" class="nav-link" data-i18n="nav.home">Home</a>
            <a href="?page=settings" class="nav-link" data-i18n="nav.settings">Settings</a>
          </nav>
        </div>
    </header>

    <main id="app" class="container">Loading...</main>

    <footer class="site-footer">
      <div class="container">© App1 — Simple SPA</div>
    </footer>

    <!-- Themed modal used by the app (hidden by default) -->
    <div id="spa-modal" class="spa-modal" aria-hidden="true">
      <div class="spa-modal-backdrop"></div>
      <div class="spa-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="spa-modal-title">
        <div class="spa-modal-header">
          <strong id="spa-modal-title"></strong>
          <button class="spa-modal-close" aria-label="Close">×</button>
        </div>
        <div class="spa-modal-body" id="spa-modal-message"></div>
        <div class="spa-modal-actions">
          <button class="spa-modal-ok btn">OK</button>
        </div>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script src="theme.js"></script>
    <script src="index.js"></script>
  </body>
</html>
