<div class="page settings-page">
  <h1 data-i18n="settings.title">Settings</h1>

  <form id="settings-form">
    <label>
      <span data-i18n="settings.lang.label">Language</span>
      <select id="lang-select">
        <option value="en" data-i18n="settings.lang.english">English</option>
        <option value="af" data-i18n="settings.lang.afrikaans">Afrikaans</option>
      </select>
    </label>

    <label>
      <span data-i18n="settings.theme.label">Theme</span>
      <select id="theme-select">
        <option value="light" data-i18n="settings.theme.light">Light</option>
        <option value="dark" data-i18n="settings.theme.dark">Dark</option>
      </select>
    </label>

    <div style="margin-top:12px">
      <button id="save-settings" type="button" data-i18n="settings.save">Save</button>
    </div>
  </form>
</div>
