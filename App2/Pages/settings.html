<section class="page-shell">
  <h1 data-i18n="settings.title">Settings</h1>
  <p data-i18n="settings.description">Select your preferred language.</p>
  <form id="settingsForm" class="settings-form">
    <label>
      <span data-i18n="settings.languageLabel">Language</span>
      <select id="languageSelect" name="language">
        <option value="en" data-i18n="settings.english">English</option>
        <option value="af" data-i18n="settings.afrikaans">Afrikaans</option>
      </select>
    </label>
    <label>
      <span data-i18n="settings.themeLabel">Theme</span>
      <select id="themeSelect" name="theme">
        <option value="light" data-i18n="settings.light">Light</option>
        <option value="dark" data-i18n="settings.dark">Dark</option>
      </select>
    </label>
  </form>
  <p class="small-note" id="settingsSaved"></p>
</section>
